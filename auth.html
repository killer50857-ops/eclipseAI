<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация Eclipse AI</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌙%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a0a3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        .auth-container {
            text-align: center;
            background: rgba(0,0,0,0.85);
            border: 3px solid #9b59b6;
            padding: 50px;
            min-width: 300px;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .icon { font-size: 64px; animation: pulse 1s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px #9b59b6; }
            50% { transform: scale(1.1); text-shadow: 0 0 20px #e74c3c; }
        }
        .spinner {
            width: 50px;
            height: 50px;
            margin: 20px auto;
            border: 4px solid #9b59b6;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h3 { color: white; margin: 20px 0; font-size: 14px; }
        .status {
            margin-top: 15px;
            padding: 10px;
            background: rgba(155,89,182,0.2);
            color: #2ecc71;
            font-size: 12px;
        }
        .error { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="icon">🌙</div>
        <div class="spinner"></div>
        <h3>Авторизация через Discord</h3>
        <div id="status" class="status">🔄 Обработка входа...</div>
    </div>

    <script>
        // Получаем токен из URL (implicit flow)
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        const error = params.get('error');
        const statusDiv = document.getElementById('status');
        
        if (error) {
            statusDiv.innerHTML = `❌ Ошибка: ${error}<br>Перенаправление...`;
            statusDiv.classList.add('error');
            setTimeout(() => {
                window.location.href = '/';
            }, 3000);
        } else if (token) {
            // Сохраняем токен
            localStorage.setItem('discord_token', token);
            localStorage.setItem('discord_token_time', Date.now());
            statusDiv.innerHTML = '✅ Успешный вход!<br>Перенаправление...';
            statusDiv.style.color = '#2ecc71';
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1500);
        } else {
            statusDiv.innerHTML = '⚠️ Не удалось получить токен<br>Перенаправление...';
            statusDiv.classList.add('error');
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        }
    </script>
</body>
</html>
