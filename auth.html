<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация Eclipse AI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a0a3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        .auth-box {
            text-align: center;
            background: rgba(0,0,0,0.8);
            border: 3px solid #9b59b6;
            padding: 40px;
            border-radius: 0;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #9b59b6;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="auth-box">
        <div class="spinner"></div>
        <h3 id="status">🔄 Обработка входа...</h3>
    </div>

    <script>
        // Получаем токен из URL
        function getTokenFromUrl() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            return params.get('access_token');
        }
        
        // Получаем ошибку из URL
        function getErrorFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('error');
        }
        
        const token = getTokenFromUrl();
        const error = getErrorFromUrl();
        const statusEl = document.getElementById('status');
        
        if (error) {
            statusEl.innerHTML = `❌ Ошибка: ${error}<br>Перенаправление...`;
            statusEl.className = 'error';
            setTimeout(() => {
                window.location.href = '/';
            }, 3000);
        } else if (token) {
            // Сохраняем токен
            localStorage.setItem('discord_token', token);
            localStorage.setItem('discord_token_time', Date.now());
            statusEl.innerHTML = '✅ Успешный вход!<br>Перенаправление...';
            statusEl.className = 'success';
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1500);
        } else {
            statusEl.innerHTML = '⚠️ Не удалось получить токен<br>Перенаправление...';
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        }
    </script>
</body>
</html>
