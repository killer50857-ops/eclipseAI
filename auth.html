<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация | Eclipse AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a0a3a 50%, #0a0a2a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        .auth-container {
            text-align: center;
            padding: 40px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #9b59b6;
            border-radius: 0;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .spinner {
            width: 60px;
            height: 60px;
            margin: 20px auto;
            border: 4px solid #9b59b6;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .icon {
            font-size: 48px;
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px #9b59b6; }
            50% { transform: scale(1.1); text-shadow: 0 0 20px #e74c3c; }
        }
        h2 {
            color: white;
            margin: 20px 0;
            font-size: 18px;
        }
        p {
            color: #9b59b6;
            font-size: 12px;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            background: rgba(155,89,182,0.2);
            color: #2ecc71;
        }
        .error {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="icon">🌙</div>
        <div class="spinner"></div>
        <h2>Авторизация через Discord</h2>
        <p>Пожалуйста, подождите...</p>
        <div id="status" class="status">🔄 Обработка входа...</div>
    </div>

    <script>
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        const error = params.get('error');
        const statusDiv = document.getElementById('status');
        
        if (error) {
            statusDiv.innerHTML = '❌ Ошибка авторизации! Перенаправление...';
            statusDiv.classList.add('error');
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        } else if (token) {
            localStorage.setItem('discord_token', token);
            localStorage.setItem('discord_token_time', Date.now());
            statusDiv.innerHTML = '✅ Успешный вход! Перенаправление...';
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1000);
        } else {
            statusDiv.innerHTML = '⚠️ Не удалось получить токен. Перенаправление...';
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        }
    </script>
</body>
</html>
