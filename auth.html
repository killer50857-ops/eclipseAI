<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация Eclipse AI</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌙%3C/text%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a0a3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        .auth-container {
            text-align: center;
            background: rgba(0,0,0,0.85);
            border: 3px solid #9b59b6;
            padding: 40px;
            min-width: 280px;
            max-width: 90%;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .icon { font-size: 60px; animation: pulse 1s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); text-shadow: 0 0 10px #9b59b6; } 50% { transform: scale(1.1); text-shadow: 0 0 20px #e74c3c; } }
        .spinner { width: 45px; height: 45px; margin: 20px auto; border: 4px solid #9b59b6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        h3 { color: white; margin: 15px 0; font-size: 14px; }
        .status { margin-top: 15px; padding: 10px; background: rgba(155,89,182,0.2); font-size: 12px; word-break: break-word; }
        .status.success { color: #2ecc71; }
        .status.error { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="icon">🌙</div>
        <div class="spinner"></div>
        <h3>Авторизация через Discord</h3>
        <div id="status" class="status">🔄 Обработка входа...</div>
    </div>
    <script>
        // ПОЛУЧАЕМ КОД ИЗ URL (ПАРАМЕТР ?code=...)
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        const statusDiv = document.getElementById('status');
        
        if (error) {
            statusDiv.innerHTML = `❌ Ошибка: ${error}<br>Перенаправление...`;
            statusDiv.className = 'status error';
            setTimeout(() => { window.location.href = '/eclipseAI/'; }, 3000);
        } else if (code) {
            // ОТПРАВЛЯЕМ КОД НА ПРОКСИ ДЛЯ ОБМЕНА НА ТОКЕН
            fetch('https://cm599040.tw1.ru/proxy.php/exchange_token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code, redirect_uri: window.location.origin + '/eclipseAI/auth' })
            })
            .then(res => res.json())
            .then(data => {
                if (data.access_token) {
                    localStorage.setItem('discord_token', data.access_token);
                    localStorage.setItem('discord_token_time', Date.now());
                    statusDiv.innerHTML = '✅ Успешный вход!<br>Перенаправление...';
                    statusDiv.className = 'status success';
                    setTimeout(() => { window.location.href = '/eclipseAI/dashboard.html'; }, 1500);
                } else {
                    throw new Error('Не удалось получить токен');
                }
            })
            .catch(() => {
                statusDiv.innerHTML = '⚠️ Ошибка обмена кода<br>Перенаправление...';
                statusDiv.className = 'status error';
                setTimeout(() => { window.location.href = '/eclipseAI/'; }, 2000);
            });
        } else {
            statusDiv.innerHTML = '⚠️ Неверный запрос (нет кода)<br>Перенаправление...';
            statusDiv.className = 'status error';
            setTimeout(() => { window.location.href = '/eclipseAI/'; }, 2000);
        }
    </script>
</body>
</html>
