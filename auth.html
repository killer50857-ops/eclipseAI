<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Авторизация Eclipse AI</title><link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌙%3C/text%3E%3C/svg%3E"><style>body{margin:0;min-height:100vh;background:linear-gradient(135deg,#0a0a2a,#1a0a3a);display:flex;justify-content:center;align-items:center;font-family:monospace}.box{text-align:center;background:#000c;border:3px solid #9b59b6;padding:40px}.spinner{width:50px;height:50px;border:4px solid #9b59b6;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto}@keyframes spin{to{transform:rotate(360deg)}}.success{color:#2ecc71}.error{color:#e74c3c}</style></head>
<body><div class="box"><div class="spinner"></div><h3 id="status">🔄 Обработка входа...</h3></div><script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        const statusEl = document.getElementById('status');
        
        if (error) {
            statusEl.innerHTML = `❌ Ошибка: ${error}<br>Перенаправление...`;
            statusEl.className = 'error';
            setTimeout(() => window.location.href = '/', 3000);
        } else if (code) {
            // Отправляем код на ваш PHP прокси для обмена на токен
            fetch('https://cm599040.tw1.ru/proxy.php/exchange_token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code, redirect_uri: window.location.origin + '/auth' })
            })
            .then(res => res.json())
            .then(data => {
                if (data.access_token) {
                    localStorage.setItem('discord_token', data.access_token);
                    localStorage.setItem('discord_token_time', Date.now());
                    statusEl.innerHTML = '✅ Успешный вход!<br>Перенаправление...';
                    statusEl.className = 'success';
                    setTimeout(() => window.location.href = '/dashboard', 1500);
                } else {
                    throw new Error('No token');
                }
            })
            .catch(() => {
                statusEl.innerHTML = '⚠️ Ошибка обмена кода<br>Перенаправление...';
                setTimeout(() => window.location.href = '/', 2000);
            });
        } else {
            statusEl.innerHTML = '⚠️ Неверный запрос<br>Перенаправление...';
            setTimeout(() => window.location.href = '/', 2000);
        }
    </script></body>
</html>
