<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse AI | Админ-панель</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="theme-eclipse">
    <div class="admin-container">
        <h1>🌙 Eclipse AI - Админ-панель</h1>
        <div class="admin-login" id="adminLoginForm">
            <input type="password" id="adminPassword" placeholder="Пароль">
            <button id="loginAdminBtn">Войти</button>
        </div>
        <div id="adminPanel" style="display:none;">
            <div class="admin-section">
                <h3>Тема</h3>
                <select id="themeSelect">
                    <option value="eclipse">Eclipse</option>
                    <option value="minecraft">Minecraft</option>
                    <option value="gta5">GTA 5</option>
                    <option value="roblox">Roblox</option>
                </select>
                <button id="applyThemeBtn">Применить</button>
            </div>
            <div class="admin-section">
                <h3>Законы</h3>
                <input type="file" id="lawFile" accept=".txt">
                <button id="uploadLawBtn">Загрузить</button>
                <button id="rebuildLawsBtn">Переобучить</button>
            </div>
            <div class="admin-section">
                <h3>Пользователи</h3>
                <div id="usersList"></div>
            </div>
            <div class="admin-section">
                <h3>История</h3>
                <div id="historyList"></div>
            </div>
        </div>
    </div>
    <script src="./js/main.js"></script>
</body>
</html>
