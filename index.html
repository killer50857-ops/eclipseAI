<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse AI | BOSTON Majestic RP</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌙%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="theme-eclipse">
    <div class="login-container">
        <div class="eclipse-card">
            <div class="eclipse-glow">🌙</div>
            <h1 class="glitch-text">ECLIPSE AI</h1>
            <p class="subtitle">BOSTON Majestic RP</p>
            <button id="discordLoginBtn" class="discord-btn">🎮 Войти через Discord</button>
            <div class="info-text">
                <span>✨ ИИ-Чат</span>
                <span>📜 RP-Помощник</span>
                <span>⚡ Мгновенные ответы</span>
            </div>
        </div>
    </div>

    <script>
        // Implicit Flow - токен приходит сразу в URL
        const CLIENT_ID = '1513909031326978261';
        const REDIRECT_URI = encodeURIComponent(window.location.origin + '/auth');
        const AUTH_URL = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=identify`;
        
        document.getElementById('discordLoginBtn').onclick = () => {
            window.location.href = AUTH_URL;
        };
        
        // Проверка сохраненного токена
        const token = localStorage.getItem('discord_token');
        const tokenTime = localStorage.getItem('discord_token_time');
        const isValid = token && tokenTime && (Date.now() - parseInt(tokenTime) < 86400000);
        
        if (isValid && window.location.pathname !== '/dashboard') {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
