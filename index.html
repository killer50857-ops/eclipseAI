<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse AI | BOSTON Majestic RP</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body class="theme-eclipse">
    <div class="login-container">
        <div class="eclipse-card">
            <div class="eclipse-glow">🌙</div>
            <h1 class="glitch-text">ECLIPSE AI</h1>
            <p class="subtitle">BOSTON Majestic RP</p>
            <button id="discordLoginBtn" class="discord-btn">🎮 Войти через Discord</button>
            <div class="info-text">
                <span>✨ ИИ-Чат</span>
                <span>📜 RP-Помощник</span>
                <span>⚡ Мгновенные ответы</span>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '1513909031326978261';
        const REDIRECT_URI = encodeURIComponent('https://killer50857-ops.github.io/eclipseAI/auth');
        
        document.getElementById('discordLoginBtn').onclick = () => {
            const authUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=identify`;
            window.location.href = authUrl;
        };
        
        // Проверяем есть ли уже токен
        const token = localStorage.getItem('discord_token');
        const tokenTime = localStorage.getItem('discord_token_time');
        const isValid = token && tokenTime && (Date.now() - parseInt(tokenTime) < 86400000);
        
        if (isValid) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
